<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{ title }} - ばあちゃんIoTサポート ガイド</title>
<style>
  :root {
    --bg: #FAFBFC;
    --card: #fff;
    --text: #2C3E50;
    --text-muted: #7A8A99;
    --primary: #4A7C59;
    --accent: #FF9F43;
    --border: #E0E6ED;
    --code-bg: #F5F5F5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    font-size: 16px;
  }
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--primary); color: white;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .topbar a { color: white; text-decoration: none; font-weight: 600; }
  .topbar .back-btn {
    background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 12px;
    font-size: 13px;
  }
  .topbar .title { flex: 1; font-size: 16px; font-weight: 700; }
  .container {
    max-width: 760px; margin: 0 auto; padding: 16px 20px 80px;
    background: var(--card);
  }
  @media (min-width: 768px) {
    .container { margin-top: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
  }
  h1 { font-size: 26px; margin: 16px 0 12px; padding-bottom: 8px; border-bottom: 3px solid var(--primary); }
  h2 { font-size: 21px; margin: 28px 0 10px; padding-left: 10px; border-left: 4px solid var(--primary); }
  h3 { font-size: 17px; margin: 20px 0 8px; color: var(--primary); }
  h4 { font-size: 15px; margin: 14px 0 6px; }
  p { margin: 8px 0; }
  ul, ol { padding-left: 24px; margin: 8px 0; }
  li { margin: 4px 0; }
  code {
    background: var(--code-bg);
    padding: 2px 6px; border-radius: 4px;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 0.9em;
  }
  pre {
    background: var(--code-bg);
    padding: 12px; border-radius: 8px;
    overflow-x: auto;
    font-size: 0.88em;
  }
  pre code { padding: 0; background: none; }
  blockquote {
    border-left: 4px solid var(--accent);
    background: #FFF8E7;
    margin: 12px 0; padding: 10px 14px;
    border-radius: 0 6px 6px 0;
    color: #5D4037;
  }
  blockquote p { margin: 4px 0; }
  table {
    border-collapse: collapse; width: 100%;
    margin: 14px 0; font-size: 14px;
    overflow-x: auto; display: block;
  }
  thead { background: #F1F4F8; }
  th, td {
    padding: 8px 10px; border: 1px solid var(--border);
    text-align: left;
  }
  th { font-weight: 700; color: var(--primary); }
  hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  a { color: var(--primary); text-decoration: underline; }
  a:active { color: var(--accent); }
  /* チェックボックス */
  input[type="checkbox"] { transform: scale(1.2); margin-right: 6px; }
  /* 印刷用 */
  @media print {
    .topbar, .print-btn, .nav-bottom { display: none !important; }
    body { background: white; font-size: 12pt; }
    .container { max-width: none; box-shadow: none; }
    h1, h2, h3 { page-break-after: avoid; }
  }
  .print-btn {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--accent); color: white;
    padding: 12px 20px; border-radius: 24px;
    border: none; cursor: pointer;
    font-size: 14px; font-weight: 700;
    box-shadow: 0 4px 12px rgba(255,159,67,0.4);
  }
  .nav-bottom {
    margin-top: 30px; padding: 16px;
    background: #F5F8FA; border-radius: 8px;
    text-align: center;
  }
  .nav-bottom a {
    display: inline-block; margin: 4px 6px;
    padding: 6px 12px; background: white; border-radius: 16px;
    text-decoration: none; font-size: 13px;
  }
</style>
</head>
<body>
<div class="topbar">
  <a href="/guide/" class="back-btn">← 一覧</a>
  <div class="title">{{ title }}</div>
</div>
<div class="container">
{{ html_content | safe }}

<div class="nav-bottom">
  <strong>ほかのガイド:</strong><br>
  <a href="/guide/">📚 一覧へ</a>
  <a href="/guide/tablet-setup">タブレット設定</a>
  <a href="/guide/grandma-usage">祖母の使い方</a>
  <a href="/guide/family-setup">家族セットアップ</a>
  <a href="/guide/line-operation">LINE操作</a>
  <a href="/guide/family-reference">機能リファレンス</a>
  <a href="/guide/troubleshooting">困った時</a>
</div>
</div>

<button class="print-btn" onclick="window.print()">🖨️ 印刷 / PDF</button>

</body>
</html>
