<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家族ログイン</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: #F5F5F5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .login-card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    width: 360px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
  }
  h1 {
    color: #1F3A5F;
    font-size: 22px;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #888;
    font-size: 14px;
    margin-bottom: 30px;
  }
  input[type="password"] {
    width: 100%;
    padding: 14px;
    border: 2px solid #DDD;
    border-radius: 10px;
    font-size: 18px;
    text-align: center;
    letter-spacing: 4px;
    margin-bottom: 15px;
  }
  input[type="password"]:focus {
    outline: none;
    border-color: #1F3A5F;
  }
  button {
    width: 100%;
    padding: 14px;
    background: #1F3A5F;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover { background: #2A4F7F; }
  .error {
    color: #C62828;
    font-size: 14px;
    margin-bottom: 15px;
  }
</style>
</head>
<body>
<div class="login-card">
  <h1>🏠 家族管理画面</h1>
  <p class="subtitle">パスワードを入力してください</p>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="/family/login">
    <input type="password" name="password" placeholder="パスワード" autofocus>
    <button type="submit">ログイン</button>
  </form>
</div>
</body>
</html>
